<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atrix — Attendance Register</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2340">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --ink:#181B2E; --ink-soft:#3A3F5C;
  --paper:#F6F5F1; --surface:#FFFFFF; --paper-line:#E7E4DA;
  --present:#1E9E8B; --present-bg:#E1F5F1;
  --absent:#E5533D; --absent-bg:#FDE9E5;
  --half:#E8A93E; --half-bg:#FCF1DC;
  --muted:#8B8A9A; --brand:#6C5CE7; --brand-2:#00C2A8;
  --radius:16px; --radius-sm:10px;
  --shadow-sm:0 1px 2px rgba(24,27,46,0.05);
  --shadow-md:0 8px 24px -8px rgba(24,27,46,0.12);
  --shadow-lg:0 20px 48px -12px rgba(24,27,46,0.18);
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;}
body{
  margin:0; background:
    radial-gradient(1200px 600px at 100% -10%, rgba(108,92,231,0.07), transparent 60%),
    radial-gradient(900px 500px at -10% 20%, rgba(0,194,168,0.06), transparent 55%),
    var(--paper);
  font-family:'Inter',sans-serif; color:var(--ink); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 90px;animation:pageIn .5s var(--ease);}
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

header.hero{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;margin-bottom:26px;flex-wrap:wrap;gap:10px;
  background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);
  border:1px solid var(--paper-line);
}
header.hero .brand-mark{display:flex;align-items:center;gap:12px;}
header.hero .brand-mark img{height:42px;width:auto;border-radius:10px;box-shadow:var(--shadow-sm);}
header.hero .tag{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.user-badge{display:flex;align-items:center;gap:10px;}
.role-pill{
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;
  padding:5px 11px;border-radius:20px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
  color:#fff;font-weight:700;
}

nav.tabs{
  display:flex;gap:4px;margin-bottom:26px;overflow-x:auto;
  background:var(--surface);padding:6px;border-radius:14px;border:1px solid var(--paper-line);box-shadow:var(--shadow-sm);
}
nav.tabs button{
  font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;background:none;border:none;
  padding:10px 16px;cursor:pointer;color:var(--muted);border-radius:10px;white-space:nowrap;
  transition:color .18s var(--ease), background .18s var(--ease);
}
nav.tabs button.active{color:#fff;background:var(--ink);box-shadow:var(--shadow-sm);}
nav.tabs button:not(.active):hover{color:var(--ink);background:var(--paper);}

.panel{display:none;}
.panel.active{display:block;animation:fade .28s var(--ease);}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.card{
  background:var(--surface);border:1px solid var(--paper-line);border-radius:var(--radius);
  padding:22px;margin-bottom:16px;box-shadow:var(--shadow-sm);
  transition:box-shadow .25s var(--ease), transform .25s var(--ease);
}
.card:hover{box-shadow:var(--shadow-md);}
h2.section-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.22rem;margin:0 0 14px;letter-spacing:-0.01em;}

input[type=text], input[type=email], input[type=password], input[type=time], select{
  font-family:'Inter',sans-serif;font-size:0.92rem;padding:11px 13px;border:1.5px solid var(--paper-line);
  border-radius:var(--radius-sm);background:var(--paper);color:var(--ink);outline:none;width:100%;
  transition:border-color .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease);
}
input:focus, select:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(108,92,231,0.14);}
input.dmy-input{font-family:'JetBrains Mono',monospace;width:120px;letter-spacing:0.03em;}
input.dmy-input.invalid{border-color:var(--absent);box-shadow:0 0 0 3px rgba(229,83,61,0.14);}
label.field-label{font-family:'JetBrains Mono',monospace;font-size:0.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:5px;}
.row-form{display:flex;gap:10px;flex-wrap:wrap;}
.field-group{display:flex;flex-direction:column;gap:4px;}

button.btn{
  font-family:'Inter',sans-serif;font-weight:600;font-size:0.87rem;padding:11px 20px;border-radius:var(--radius-sm);
  border:none;background:var(--ink);color:#fff;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .15s var(--ease), box-shadow .2s var(--ease), opacity .15s var(--ease);
}
button.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
button.btn:active{transform:translateY(0px) scale(.98);}
button.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
button.btn.ghost{background:none;color:var(--ink);border:1.5px solid var(--paper-line);}
button.btn.ghost:hover{border-color:var(--ink);}
button.btn.small{padding:7px 13px;font-size:0.78rem;}
button.btn.wide{width:100%;}

/* ---------- LOGIN ---------- */
#login-view{max-width:380px;margin:70px auto 0;animation:fade .4s var(--ease);}
#login-view .card{padding:34px 28px;position:relative;overflow:hidden;}
#login-view .card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--brand),var(--brand-2));
}
#login-view h2.section-title{margin-bottom:22px;}
#login-view .field{margin-bottom:16px;}
#login-view input{padding:12px 14px;}
#login-error{color:var(--absent);font-size:0.85rem;margin-top:10px;display:none;}

/* ---------- Attendance status card ---------- */
.status-hero{text-align:center;padding:22px 10px;}
.status-date{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:0.78rem;margin-bottom:8px;letter-spacing:0.02em;}
.status-badge{
  display:inline-block;font-family:'Fraunces',serif;font-weight:700;font-size:1.5rem;
  padding:12px 30px;border-radius:18px;margin:8px 0 16px;animation:popIn .35s var(--ease);
}
@keyframes popIn{0%{opacity:0;transform:scale(0.85);}60%{transform:scale(1.03);}100%{opacity:1;transform:scale(1);}}
.status-badge.p{background:var(--present-bg);color:var(--present);}
.status-badge.a{background:var(--absent-bg);color:var(--absent);}
.status-badge.h{background:var(--half-bg);color:var(--half);}
.time-line{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--muted);margin:4px 0;animation:fade .3s var(--ease);}
.time-line a{color:var(--brand);text-decoration:none;font-weight:600;}
.time-line a:hover{text-decoration:underline;}
.mark-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.mark-buttons button{min-width:130px;}
.geo-hint{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);margin-top:16px;}
.geo-status{font-size:0.85rem;margin-top:10px;min-height:1.2em;transition:color .2s;}
.geo-status.working{color:var(--brand);}
.geo-status.error{color:var(--absent);}

/* ---------- Team ---------- */
ul.emp-list{list-style:none;padding:0;margin:0;}
ul.emp-list li{
  display:flex;align-items:center;justify-content:space-between;padding:13px 6px;
  border-bottom:1px solid var(--paper-line);gap:10px;flex-wrap:wrap;transition:background .15s;border-radius:8px;
}
ul.emp-list li:hover{background:var(--paper);}
ul.emp-list li:last-child{border-bottom:none;}
.emp-identity{display:flex;align-items:center;gap:12px;}
.avatar{
  width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:0.95rem;color:#fff;
  box-shadow:0 0 0 2px #fff, 0 0 0 3px var(--paper-line);
}
.emp-name{font-weight:600;font-size:0.98rem;}
.emp-meta{font-family:'JetBrains Mono',monospace;font-size:0.66rem;color:var(--muted);}
button.icon-btn{
  background:var(--paper);border:1px solid var(--paper-line);border-radius:8px;width:32px;height:32px;cursor:pointer;
  font-size:0.9rem;color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:all .15s var(--ease);
}
button.icon-btn:hover{border-color:var(--ink);color:var(--ink);background:#fff;transform:translateY(-1px);}
.edit-form{display:flex;gap:10px;align-items:center;flex-wrap:wrap;width:100%;background:var(--paper);border-radius:var(--radius-sm);padding:14px;margin:6px 0;animation:fade .2s var(--ease);}
.photo-input-wrap input[type=file]{font-family:'Inter',sans-serif;font-size:0.78rem;max-width:170px;width:auto;}
.field-hint{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.92rem;}

/* ---------- Reports / period tabs ---------- */
.period-tabs{display:flex;gap:6px;margin-bottom:16px;}
.period-tabs button{
  font-family:'Inter',sans-serif;font-weight:600;font-size:0.8rem;padding:8px 16px;border-radius:20px;
  border:1.5px solid var(--paper-line);background:var(--surface);color:var(--muted);cursor:pointer;
  transition:all .18s var(--ease);
}
.period-tabs button.active{background:var(--ink);border-color:var(--ink);color:#fff;}
.period-tabs button:not(.active):hover{border-color:var(--ink);color:var(--ink);}

.range-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.range-label{font-family:'Fraunces',serif;font-weight:600;font-size:1.02rem;}
.range-nav-btn{
  width:34px;height:34px;border-radius:var(--radius-sm);border:1.5px solid var(--paper-line);background:var(--surface);
  cursor:pointer;font-size:0.95rem;transition:all .15s var(--ease);
}
.range-nav-btn:hover{border-color:var(--ink);transform:translateY(-1px);}
.date-field-wrap{position:relative;display:inline-block;}
.cal-toggle-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:1.5px solid var(--paper-line);background:var(--surface);cursor:pointer;font-size:1rem;transition:all .15s var(--ease);}
.cal-toggle-btn:hover{border-color:var(--ink);}
.cal-popup{
  position:absolute;top:44px;left:0;z-index:30;background:#fff;border:1px solid var(--paper-line);border-radius:14px;
  padding:14px;width:260px;box-shadow:var(--shadow-lg);animation:popIn .18s var(--ease);
}
.cal-popup.hidden{display:none;}
.cal-popup-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-popup-nav button{background:none;border:none;cursor:pointer;font-size:1rem;color:var(--ink);padding:4px 8px;border-radius:6px;}
.cal-popup-nav button:hover{background:var(--paper);}
.cal-popup-nav .cal-popup-title{font-family:'Fraunces',serif;font-weight:600;font-size:0.9rem;display:flex;gap:4px;}
.cal-popup-title select{
  font-family:'Fraunces',serif;font-weight:600;font-size:0.85rem;border:1px solid var(--paper-line);
  border-radius:6px;background:#fff;color:var(--ink);padding:2px 4px;
}
.cal-popup-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-popup-grid .dow{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);text-align:center;padding:3px 0;}
.cal-popup-grid button.day-btn{
  aspect-ratio:1;border:1px solid transparent;background:none;border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;cursor:pointer;color:var(--ink);transition:all .12s;
}
.cal-popup-grid button.day-btn:hover{background:var(--paper);border-color:var(--paper-line);}
.cal-popup-grid button.day-btn.selected{background:var(--ink);color:#fff;}
.cal-popup-grid button.day-btn.today-marker{border-color:var(--brand);}

table.summary{width:100%;border-collapse:collapse;font-size:0.9rem;}
table.summary th{
  text-align:left;font-family:'JetBrains Mono',monospace;font-size:0.66rem;text-transform:uppercase;
  letter-spacing:0.05em;color:var(--muted);padding:9px 6px;border-bottom:2px solid var(--ink);
}
table.summary td{padding:12px 6px;border-bottom:1px solid var(--paper-line);vertical-align:top;}
table.summary tr{transition:background .15s;}
table.summary tbody tr:hover{background:var(--paper);}
.name-cell{display:flex;align-items:center;gap:10px;cursor:pointer;}
.expand-hint{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted);}
.count-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.8rem;padding:3px 10px;border-radius:20px;}
.count-pill.p{background:var(--present-bg);color:var(--present);}
.count-pill.a{background:var(--absent-bg);color:var(--absent);}
.count-pill.h{background:var(--half-bg);color:var(--half);}
.emp-log-row td{background:var(--paper);padding:0;}
.emp-log-inner{padding:14px 16px;animation:fade .22s var(--ease);}
.log-list{max-height:340px;overflow-y:auto;border:1px solid var(--paper-line);border-radius:var(--radius-sm);background:#fff;}
.log-row{padding:11px 14px;border-bottom:1px solid var(--paper-line);font-size:0.85rem;transition:background .15s;}
.log-row:hover{background:var(--paper);}
.log-row:last-child{border-bottom:none;}
.log-date-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.log-date{font-family:'JetBrains Mono',monospace;color:var(--ink);}
.log-times{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;}
.log-times a{color:var(--brand);}
.log-empty{padding:18px;text-align:center;color:var(--muted);font-size:0.85rem;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px) scale(.96);
  background:var(--ink);color:#fff;padding:11px 22px;border-radius:12px;font-size:0.85rem;
  opacity:0;pointer-events:none;transition:all .3s var(--ease);font-weight:500;z-index:50;box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}

/* ---------- Global loading overlay ---------- */
#global-loader{
  position:fixed;inset:0;background:rgba(246,245,241,0.78);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;
  z-index:1000;opacity:0;transition:opacity .2s var(--ease);
}
#global-loader.show{display:flex;opacity:1;}
.loader-spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--paper-line);border-top-color:var(--brand);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-label{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}

.inline-spinner{
  display:inline-block;width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
  animation:spin .6s linear infinite;vertical-align:-2px;margin-right:6px;
}
.inline-spinner.dark{border:2px solid var(--paper-line);border-top-color:var(--ink);}
.panel-loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.88rem;font-family:'JetBrains Mono',monospace;}
.panel-loading .loader-spinner{width:24px;height:24px;border-width:2.5px;margin:0 auto 10px;}
</style>
</head>

<script>
// ---------- SUPABASE INIT ----------
const SUPABASE_URL = "https://your-supabase-url.supabase.co"; // Replace with your URL
const SUPABASE_ANON_KEY = "your-anon-key"; // Replace with your Anon Key
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// State
let currentUser = null;
let currentProfile = null;
let allProfiles = [];
let reportPeriod = 'monthly'; // daily | weekly | monthly
let reportAnchorDate = new Date();
let tsMonthAnchor = new Date();
let expandedUserLogs = {}; // profile_id -> boolean

// Global calendar state tracking
let calState = {};

// Helper: DOM Loader
function showLoader(text="Loading…"){
  const l = document.getElementById('global-loader');
  l.querySelector('.loader-label').textContent = text;
  l.classList.add('show');
}
function hideLoader(){
  document.getElementById('global-loader').classList.remove('show');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 3000);
}

// Escape HTML
function escapeHtml(str){
  if(!str) return '';
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Date Formatters (DD/MM/YYYY)
function dateToISO(d){
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}
function isoToDMY(isoStr){
  if(!isoStr) return '';
  const parts = isoStr.split('-');
  if(parts.length !== 3) return isoStr;
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}
function dmyToISO(dmyStr){
  if(!dmyStr) return null;
  const parts = dmyStr.split('/');
  if(parts.length !== 3) return null;
  const dd = parseInt(parts[0], 10);
  const mm = parseInt(parts[1], 10);
  const yyyy = parseInt(parts[2], 10);
  if(isNaN(dd) || isNaN(mm) || isNaN(yyyy)) return null;
  if(dd < 1 || dd > 31 || mm < 1 || mm > 12 || yyyy < 1900 || yyyy > 2100) return null;
  return `${yyyy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
}
function parseDMYToDate(dmyStr){
  const iso = dmyToISO(dmyStr);
  if(!iso) return null;
  return new Date(iso + 'T00:00:00');
}
function fmtTime12(time24){
  if(!time24) return '';
  const parts = time24.split(':');
  let h = parseInt(parts[0], 10);
  const m = parts[1];
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}
function timeToMinutes(t){
  if(!t) return 0;
  const p = t.split(':');
  return parseInt(p[0],10)*60 + parseInt(p[1],10);
}
function fmtDuration(mins){
  if(mins <= 0) return '0m';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if(h > 0 && m > 0) return `${h}h ${m}m`;
  if(h > 0) return `${h}h`;
  return `${m}m`;
}
function dayLabel(isoStr){
  const d = new Date(isoStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short' });
}

// Map Link
function buildMapLink(lat, lng){
  if(!lat || !lng) return '';
  return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" rel="noopener">📍 Map</a>`;
}

// Setup DMY auto-formatting on text inputs
function attachDmyInputHandler(inputId, onChangeCallback){
  const el = document.getElementById(inputId);
  if(!el) return;
  el.addEventListener('input', (e)=>{
    let v = e.target.value.replace(/\D/g, '');
    if(v.length > 8) v = v.substring(0,8);
    let formatted = '';
    if(v.length > 0) formatted += v.substring(0,2);
    if(v.length >= 3) formatted += '/' + v.substring(2,4);
    if(v.length >= 5) formatted += '/' + v.substring(4,8);
    e.target.value = formatted;

    if(formatted.length === 10){
      if(dmyToISO(formatted)){
        el.classList.remove('invalid');
        if(onChangeCallback) onChangeCallback(formatted);
      } else {
        el.classList.add('invalid');
      }
    } else {
      el.classList.remove('invalid');
    }
  });
}

// Custom Datepicker Popup Logic
function toggleCal(popupId){
  const pop = document.getElementById(popupId);
  if(!pop) return;
  const isHidden = pop.classList.contains('hidden');
  document.querySelectorAll('.cal-popup').forEach(p=> p.classList.add('hidden'));
  if(isHidden){
    pop.classList.remove('hidden');
    renderCalPopup(popupId);
  }
}

// Close calendar when clicking outside
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.date-field-wrap')){
    document.querySelectorAll('.cal-popup').forEach(p=> p.classList.add('hidden'));
  }
});

function renderCalPopup(popupId){
  const pop = document.getElementById(popupId);
  if(!pop) return;

  if(!calState[popupId]){
    calState[popupId] = { month: new Date().getMonth(), year: new Date().getFullYear() };
  }
  const st = calState[popupId];

  // Determine associated input
  let targetInputId = 'ts-date';
  if(popupId === 'rep-cal-popup') targetInputId = 'report-daily-date';

  const inputEl = document.getElementById(targetInputId);
  const selectedIso = dmyToISO(inputEl.value);

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let yearOptions = '';
  for(let y=2020; y<=2030; y++){
    yearOptions += `<option value="${y}" ${y===st.year?'selected':''}>${y}</option>`;
  }

  let html = `
    <div class="cal-popup-nav">
      <button type="button" onclick="changeCalMonth('${popupId}', -1)">‹</button>
      <div class="cal-popup-title">
        <span>${monthNames[st.month]}</span>
        <select onchange="changeCalYear('${popupId}', this.value)">${yearOptions}</select>
      </div>
      <button type="button" onclick="changeCalMonth('${popupId}', 1)">›</button>
    </div>
    <div class="cal-popup-grid">
      <div class="dow">Su</div><div class="dow">Mo</div><div class="dow">Tu</div>
      <div class="dow">We</div><div class="dow">Th</div><div class="dow">Fr</div><div class="dow">Sa</div>
  `;

  const firstDay = new Date(st.year, st.month, 1).getDay();
  const daysInMonth = new Date(st.year, st.month+1, 0).getDate();
  const todayIso = dateToISO(new Date());

  for(let i=0; i<firstDay; i++){
    html += `<div></div>`;
  }

  for(let d=1; d<=daysInMonth; d++){
    const cellDate = new Date(st.year, st.month, d);
    const cellIso = dateToISO(cellDate);
    const cellDmy = isoToDMY(cellIso);

    let cls = 'day-btn';
    if(cellIso === selectedIso) cls += ' selected';
    if(cellIso === todayIso) cls += ' today-marker';

    html += `<button type="button" class="${cls}" onclick="selectCalDate('${popupId}', '${targetInputId}', '${cellDmy}')">${d}</button>`;
  }

  html += `</div>`;
  pop.innerHTML = html;
}

function changeCalMonth(popupId, delta){
  let st = calState[popupId];
  st.month += delta;
  if(st.month < 0){ st.month = 11; st.year--; }
  if(st.month > 11){ st.month = 0; st.year++; }
  renderCalPopup(popupId);
}
function changeCalYear(popupId, yearVal){
  calState[popupId].year = parseInt(yearVal, 10);
  renderCalPopup(popupId);
}
function selectCalDate(popupId, targetInputId, dmyStr){
  const el = document.getElementById(targetInputId);
  if(el){
    el.value = dmyStr;
    el.classList.remove('invalid');
    if(targetInputId === 'report-daily-date'){
      const parsed = parseDMYToDate(dmyStr);
      if(parsed){
        reportAnchorDate = parsed;
        renderReportsPanel();
      }
    }
  }
  document.getElementById(popupId).classList.add('hidden');
}

// ---------- AUTH LOGIC ----------
async function signIn(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if(!email || !pass){
    errEl.textContent = 'Please enter email and password.';
    errEl.style.display = 'block';
    return;
  }

  showLoader('Signing in…');
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if(error){
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      return;
    }
    await onLoggedIn(data.user);
  } finally {
    hideLoader();
  }
}

async function signOut(){
  showLoader('Signing out…');
  try{
    await sb.auth.signOut();
    currentUser = null;
    currentProfile = null;
    allProfiles = [];
    document.getElementById('app-view').style.display = 'none';
    document.getElementById('user-badge').style.display = 'none';
    document.getElementById('login-view').style.display = 'block';
  } finally {
    hideLoader();
  }
}

async function onLoggedIn(user){
  currentUser = user;
  // Fetch current user profile
  const { data: prof, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !prof){
    showToast('Failed to load profile.');
    return;
  }
  currentProfile = prof;

  // Render header badge
  document.getElementById('badge-name').textContent = prof.full_name || user.email;
  const roleEl = document.getElementById('badge-role');
  roleEl.textContent = prof.role.toUpperCase();
  if(prof.role === 'admin'){
    document.getElementById('tab-team').style.display = 'inline-block';
  } else {
    document.getElementById('tab-team').style.display = 'none';
  }
  document.getElementById('user-badge').style.display = 'flex';
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('app-view').style.display = 'block';

  // Fetch all profiles if admin or for report names
  const { data: profs } = await sb.from('profiles').select('*').order('full_name');
  allProfiles = profs || [];

  // Init default input values
  document.getElementById('ts-date').value = isoToDMY(dateToISO(new Date()));
  document.getElementById('report-daily-date').value = isoToDMY(dateToISO(new Date()));

  attachDmyInputHandler('ts-date');
  attachDmyInputHandler('report-daily-date', (dmy)=>{
    const parsed = parseDMYToDate(dmy);
    if(parsed){
      reportAnchorDate = parsed;
      renderReportsPanel();
    }
  });

  switchTab('mark');
}

// ---------- TAB SWITCHING ----------
function switchTab(tabName){
  document.querySelectorAll('nav.tabs button').forEach(b=> b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=> p.classList.remove('active'));

  if(tabName === 'mark'){
    document.querySelector('nav.tabs button[onclick*="mark"]').classList.add('active');
    document.getElementById('panel-mark').classList.add('active');
    renderMarkPanel();
  } else if(tabName === 'timesheet'){
    document.getElementById('tab-timesheet').classList.add('active');
    document.getElementById('panel-timesheet').classList.add('active');
    renderTimesheetPanel();
  } else if(tabName === 'team'){
    document.getElementById('tab-team').classList.add('active');
    document.getElementById('panel-team').classList.add('active');
    renderTeamPanel();
  } else if(tabName === 'reports'){
    document.querySelector('nav.tabs button[onclick*="reports"]').classList.add('active');
    document.getElementById('panel-reports').classList.add('active');
    renderReportsPanel();
  }
}

// ---------- MARK ATTENDANCE LOGIC ----------
async function renderMarkPanel(){
  const todayStr = dateToISO(new Date());
  document.getElementById('mark-date-label').textContent = `TODAY (${isoToDMY(todayStr)})`;

  const badge = document.getElementById('status-badge');
  const inLine = document.getElementById('time-in-line');
  const outLine = document.getElementById('time-out-line');
  const btnIn = document.getElementById('btn-clock-in');
  const btnOut = document.getElementById('btn-clock-out');

  // Query today's record for this user
  const { data: rec } = await sb.from('attendance')
    .select('*')
    .eq('profile_id', currentUser.id)
    .eq('date', todayStr)
    .maybeSingle();

  if(!rec){
    badge.className = 'status-badge a';
    badge.textContent = 'NOT MARKED';
    inLine.style.display = 'none';
    outLine.style.display = 'none';
    btnIn.disabled = false;
    btnOut.disabled = true;
  } else {
    badge.className = 'status-badge p';
    badge.textContent = rec.status === 'half_day' ? 'HALF DAY' : 'PRESENT';

    document.getElementById('time-in-val').textContent = fmtTime12(rec.time_in);
    document.getElementById('map-in-wrap').innerHTML = buildMapLink(rec.latitude_in, rec.longitude_in);
    inLine.style.display = 'block';

    if(rec.time_out){
      document.getElementById('time-out-val').textContent = fmtTime12(rec.time_out);
      document.getElementById('map-out-wrap').innerHTML = buildMapLink(rec.latitude_out, rec.longitude_out);
      outLine.style.display = 'block';
      btnIn.disabled = true;
      btnOut.disabled = true;
    } else {
      outLine.style.display = 'none';
      btnIn.disabled = true;
      btnOut.disabled = false;
    }
  }
}

function getGeolocation(){
  return new Promise((resolve)=>{
    const geoStatus = document.getElementById('geo-status');
    if(!navigator.geolocation){
      if(geoStatus){ geoStatus.className = 'geo-status error'; geoStatus.textContent = 'Geolocation not supported by browser.'; }
      resolve(null);
      return;
    }
    if(geoStatus){ geoStatus.className = 'geo-status working'; geoStatus.textContent = 'Fetching location…'; }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        if(geoStatus){ geoStatus.textContent = ''; }
        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
      },
      (err)=>{
        if(geoStatus){ geoStatus.className = 'geo-status error'; geoStatus.textContent = 'Location access denied or unavailable.'; }
        resolve(null);
      },
      { timeout: 8000, enableHighAccuracy: true }
    );
  });
}

async function clockIn(){
  const loc = await getGeolocation();
  const todayStr = dateToISO(new Date());
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:00`;

  showLoader('Clocking in…');
  try{
    const payload = {
      profile_id: currentUser.id,
      date: todayStr,
      time_in: timeStr,
      status: 'present',
      latitude_in: loc ? loc.lat : null,
      longitude_in: loc ? loc.lng : null
    };

    const { error } = await sb.from('attendance').upsert(payload, { onConflict: 'profile_id,date' });
    if(error){ showToast('Error: ' + error.message); return; }
    showToast('Clocked in successfully!');
    await renderMarkPanel();
  } finally {
    hideLoader();
  }
}

async function clockOut(){
  const loc = await getGeolocation();
  const todayStr = dateToISO(new Date());
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:00`;

  showLoader('Clocking out…');
  try{
    const payload = {
      time_out: timeStr,
      latitude_out: loc ? loc.lat : null,
      longitude_out: loc ? loc.lng : null
    };

    const { error } = await sb.from('attendance')
      .update(payload)
      .eq('profile_id', currentUser.id)
      .eq('date', todayStr);

    if(error){ showToast('Error: ' + error.message); return; }
    showToast('Clocked out successfully!');
    await renderMarkPanel();
  } finally {
    hideLoader();
  }
}

// ---------- TIMESHEET LOGIC ----------
async function addTimesheetEntry(){
  const dmy = document.getElementById('ts-date').value.trim();
  const start = document.getElementById('ts-start').value;
  const end = document.getElementById('ts-end').value;
  const desc = document.getElementById('ts-desc').value.trim();

  const isoDate = dmyToISO(dmy);
  if(!isoDate){ showToast('Please enter a valid date (DD/MM/YYYY)'); return; }
  if(!start || !end){ showToast('Please provide start and end times'); return; }
  if(start >= end){ showToast('End time must be after start time'); return; }
  if(!desc){ showToast('Please enter a description'); return; }

  showLoader('Saving entry…');
  try{
    const { error } = await sb.from('timesheets').insert({
      profile_id: currentUser.id,
      date: isoDate,
      start_time: start,
      end_time: end,
      work_description: desc
    });
    if(error){ showToast('Could not save: ' + error.message); return; }
    showToast('Entry saved!');
    document.getElementById('ts-desc').value = '';
    renderTimesheetPanel();
  } finally {
    hideLoader();
  }
}

function shiftTsMonth(delta){
  tsMonthAnchor.setMonth(tsMonthAnchor.getMonth() + delta);
  renderTimesheetPanel();
}

async function renderTimesheetPanel(){
  const yr = tsMonthAnchor.getFullYear();
  const mo = tsMonthAnchor.getMonth();
  const mName = tsMonthAnchor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  document.getElementById('ts-month-label').textContent = mName;

  const startIso = dateToISO(new Date(yr, mo, 1));
  const endIso = dateToISO(new Date(yr, mo + 1, 0));

  const container = document.getElementById('ts-list-container');
  container.innerHTML = `<div class="panel-loading"><div class="loader-spinner"></div>Loading timesheets…</div>`;

  const { data: logs, error } = await sb.from('timesheets')
    .select('*')
    .eq('profile_id', currentUser.id)
    .gte('date', startIso)
    .lte('date', endIso)
    .order('date', { ascending: false });

  if(error){ container.innerHTML = `<div class="empty-state">Error loading timesheets</div>`; return; }
  if(!logs || logs.length === 0){
    container.innerHTML = `<div class="empty-state">No work entries for ${mName}</div>`;
    return;
  }

  let html = `<div class="log-list">`;
  logs.forEach(r=>{
    const durMins = timeToMinutes(r.end_time) - timeToMinutes(r.start_time);
    html += `
      <div class="log-row">
        <div class="log-date-line">
          <span class="log-date">${isoToDMY(r.date)} · ${dayLabel(r.date)}</span>
          <div>
            <span class="count-pill p">${fmtDuration(durMins)}</span>
            <button class="icon-btn del-ts-btn" data-id="${r.id}" style="display:inline-flex;width:24px;height:24px;font-size:0.7rem;margin-left:8px;">✕</button>
          </div>
        </div>
        <div class="log-times">${fmtTime12(r.start_time)} – ${fmtTime12(r.end_time)} — ${escapeHtml(r.work_description)}</div>
      </div>
    `;
  });
  html += `</div>`;
  container.innerHTML = html;

  container.querySelectorAll('.del-ts-btn').forEach(b=>{
    b.addEventListener('click', async (e)=>{
      if(!confirm('Delete this entry?')) return;
      const id = b.dataset.id;
      const { error } = await sb.from('timesheets').delete().eq('id', id);
      if(error){ showToast('Delete failed: ' + error.message); return; }
      renderTimesheetPanel();
    });
  });
}

// ---------- TEAM PANEL LOGIC (ADMIN) ----------
async function renderTeamPanel(){
  const listEl = document.getElementById('team-list');
  listEl.innerHTML = `<div class="panel-loading"><div class="loader-spinner"></div>Loading team…</div>`;

  const { data: profs, error } = await sb.from('profiles').select('*').order('full_name');
  if(error){ listEl.innerHTML = `<div class="empty-state">Error loading team</div>`; return; }
  allProfiles = profs || [];

  if(profs.length === 0){
    listEl.innerHTML = `<div class="empty-state">No team members found</div>`;
    return;
  }

  let html = '';
  profs.forEach(p=>{
    const avatarContent = p.avatar_url ? 
      `<img src="${p.avatar_url}" class="avatar">` : 
      `<div class="avatar" style="background:var(--brand);">${(p.full_name||'U').charAt(0).toUpperCase()}</div>`;

    html += `
      <li id="emp-li-${p.id}">
        <div class="emp-identity">
          ${avatarContent}
          <div>
            <div class="emp-name">${escapeHtml(p.full_name)}</div>
            <div class="emp-meta">${escapeHtml(p.email || '')} · <span style="text-transform:uppercase">${p.role}</span></div>
          </div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn ghost small" onclick="toggleEditEmp('${p.id}')">Edit</button>
        </div>
        <div id="edit-box-${p.id}" class="edit-form" style="display:none;">
          <div class="field-group" style="flex:1;">
            <label class="field-label">Name</label>
            <input type="text" id="edit-name-${p.id}" value="${escapeHtml(p.full_name)}">
          </div>
          <div class="field-group" style="width:120px;">
            <label class="field-label">Role</label>
            <select id="edit-role-${p.id}">
              <option value="employee" ${p.role==='employee'?'selected':''}>Employee</option>
              <option value="admin" ${p.role==='admin'?'selected':''}>Admin</option>
            </select>
          </div>
          <button class="btn small" onclick="saveEmpEdit('${p.id}')">Save</button>
          <button class="btn ghost small" onclick="toggleEditEmp('${p.id}')">Cancel</button>
        </div>
      </li>
    `;
  });
  listEl.innerHTML = html;
}

function toggleEditEmp(id){
  const box = document.getElementById(`edit-box-${id}`);
  if(box) box.style.display = box.style.display === 'none' ? 'flex' : 'none';
}

async function saveEmpEdit(id){
  const name = document.getElementById(`edit-name-${id}`).value.trim();
  const role = document.getElementById(`edit-role-${id}`).value;
  if(!name){ showToast('Name cannot be empty.'); return; }

  showLoader('Updating user…');
  try{
    const { error } = await sb.from('profiles').update({ full_name: name, role: role }).eq('id', id);
    if(error){ showToast('Error: ' + error.message); return; }
    showToast('User updated successfully.');
    renderTeamPanel();
  } finally {
    hideLoader();
  }
}

async function addTeamMember(){
  const name = document.getElementById('add-emp-name').value.trim();
  const email = document.getElementById('add-emp-email').value.trim();
  const pass = document.getElementById('add-emp-pass').value;
  const role = document.getElementById('add-emp-role').value;
  const photoFile = document.getElementById('add-emp-photo').files[0];

  if(!name || !email || !pass){
    showToast('Name, Email and Password are required.');
    return;
  }

  showLoader('Creating team member…');
  try{
    // Note: Creating user via supabase auth signup or secondary client
    const { data: authData, error: authErr } = await sb.auth.signUp({
      email,
      password: pass,
      options: { data: { full_name: name, role: role } }
    });

    if(authErr){ showToast('Auth Error: ' + authErr.message); return; }
    if(!authData.user){ showToast('Could not create auth user.'); return; }

    let avatarUrl = null;
    if(photoFile){
      const fileExt = photoFile.name.split('.').pop();
      const filePath = `${authData.user.id}-${Date.now()}.${fileExt}`;
      const { error: uploadErr } = await sb.storage.from('avatars').upload(filePath, photoFile);
      if(!uploadErr){
        const { data: pubUrl } = sb.storage.from('avatars').getPublicUrl(filePath);
        avatarUrl = pubUrl.publicUrl;
      }
    }

    // Insert or update profile record
    const { error: profErr } = await sb.from('profiles').upsert({
      id: authData.user.id,
      full_name: name,
      email: email,
      role: role,
      avatar_url: avatarUrl
    });

    if(profErr){ showToast('Profile insert error: ' + profErr.message); return; }

    showToast('Team member added!');
    document.getElementById('add-emp-name').value = '';
    document.getElementById('add-emp-email').value = '';
    document.getElementById('add-emp-pass').value = '';
    document.getElementById('add-emp-photo').value = '';
    renderTeamPanel();
  } finally {
    hideLoader();
  }
}

// ---------- REPORTS PANEL LOGIC ----------
function setReportPeriod(period){
  reportPeriod = period;
  document.getElementById('btn-p-daily').classList.toggle('active', period === 'daily');
  document.getElementById('btn-p-weekly').classList.toggle('active', period === 'weekly');
  document.getElementById('btn-p-monthly').classList.toggle('active', period === 'monthly');

  document.getElementById('daily-picker-wrap').style.display = (period === 'daily') ? 'inline-block' : 'none';
  renderReportsPanel();
}

function shiftReportRange(delta){
  if(reportPeriod === 'daily'){
    reportAnchorDate.setDate(reportAnchorDate.getDate() + delta);
    document.getElementById('report-daily-date').value = isoToDMY(dateToISO(reportAnchorDate));
  } else if(reportPeriod === 'weekly'){
    reportAnchorDate.setDate(reportAnchorDate.getDate() + (delta * 7));
  } else if(reportPeriod === 'monthly'){
    reportAnchorDate.setMonth(reportAnchorDate.getMonth() + delta);
  }
  renderReportsPanel();
}

function getReportDateRange(){
  const d = new Date(reportAnchorDate);
  if(reportPeriod === 'daily'){
    const iso = dateToISO(d);
    return { startIso: iso, endIso: iso, label: isoToDMY(iso) };
  } else if(reportPeriod === 'weekly'){
    const day = d.getDay();
    const diffToMon = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d.setDate(diffToMon));
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    const startIso = dateToISO(mon);
    const endIso = dateToISO(sun);
    return { startIso, endIso, label: `${isoToDMY(startIso)} – ${isoToDMY(endIso)}` };
  } else {
    const yr = d.getFullYear();
    const mo = d.getMonth();
    const startIso = dateToISO(new Date(yr, mo, 1));
    const endIso = dateToISO(new Date(yr, mo + 1, 0));
    const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    return { startIso, endIso, label };
  }
}

async function renderReportsPanel(){
  const { startIso, endIso, label } = getReportDateRange();
  document.getElementById('report-range-label').textContent = label;

  const container = document.getElementById('report-summary-container');
  container.innerHTML = `<div class="panel-loading"><div class="loader-spinner"></div>Loading report…</div>`;

  // Determine targeted users (Admins see all profiles, employees see themselves)
  let targetProfiles = currentProfile.role === 'admin' ? allProfiles : [currentProfile];
  if(targetProfiles.length === 0) targetProfiles = [currentProfile];

  // Fetch attendance for period
  const { data: attData } = await sb.from('attendance')
    .select('*')
    .gte('date', startIso)
    .lte('date', endIso);

  // Fetch timesheets for period
  const { data: tsData } = await sb.from('timesheets')
    .select('*')
    .gte('date', startIso)
    .lte('date', endIso);

  const attList = attData || [];
  const tsList = tsData || [];

  let html = `
    <table class="summary">
      <thead>
        <tr>
          <th>Employee</th>
          <th style="text-align:center;">Present</th>
          <th style="text-align:center;">Half Day</th>
          <th style="text-align:center;">Logged Hours</th>
        </tr>
      </thead>
      <tbody>
  `;

  targetProfiles.forEach(p=>{
    const userAtt = attList.filter(a=> a.profile_id === p.id);
    const userTs = tsList.filter(t=> t.profile_id === p.id);

    const presentCount = userAtt.filter(a=> a.status === 'present').length;
    const halfCount = userAtt.filter(a=> a.status === 'half_day').length;

    let totalMins = 0;
    userTs.forEach(t=>{
      totalMins += (timeToMinutes(t.end_time) - timeToMinutes(t.start_time));
    });

    const isExpanded = !!expandedUserLogs[p.id];

    html += `
      <tr>
        <td>
          <div class="name-cell" onclick="toggleUserLogExpand('${p.id}')">
            <span style="font-weight:600;">${escapeHtml(p.full_name)}</span>
            <span class="expand-hint">${isExpanded ? '▲ Hide Log' : '▼ View Log'}</span>
          </div>
        </td>
        <td style="text-align:center;"><span class="count-pill p">${presentCount}</span></td>
        <td style="text-align:center;"><span class="count-pill h">${halfCount}</span></td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;">${fmtDuration(totalMins)}</td>
      </tr>
    `;

    if(isExpanded){
      html += `
        <tr class="emp-log-row">
          <td colspan="4">
            ${renderTsListHtml(userTs, p.full_name)}
          </td>
        </tr>
      `;
    }
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
}

function toggleUserLogExpand(profId){
  expandedUserLogs[profId] = !expandedUserLogs[profId];
  renderReportsPanel();
}

function renderTsListHtml(recs, name){
  const sorted = recs.slice().sort((a,b)=> b.date.localeCompare(a.date) || a.start_time.localeCompare(b.start_time));
  let html = `<div class="emp-log-inner"><div class="log-list">`;
  if(sorted.length === 0){
    html += `<div class="log-empty">No work entries logged for ${escapeHtml(name)} in this period.</div>`;
  } else {
    sorted.forEach(r=>{
      html += `
        <div class="log-row">
          <div class="log-date-line">
            <span class="log-date">${isoToDMY(r.date)} · ${dayLabel(r.date)}</span>
            <span class="count-pill p">${fmtDuration(timeToMinutes(r.end_time) - timeToMinutes(r.start_time))}</span>
          </div>
          <div class="log-times">${fmtTime12(r.start_time)} – ${fmtTime12(r.end_time)} — ${escapeHtml(r.work_description)}</div>
        </div>
      `;
    });
  }
  html += `</div></div>`;
  return html;
}

// ---------- INIT ----------
(async function init(){
  showLoader('Loading…');
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(session && session.user){
      await onLoggedIn(session.user);
    }
  } finally {
    hideLoader();
  }
})();

// Keep login/dashboard view synced on auth state change
sb.auth.onAuthStateChange((event)=>{
  if(event === 'SIGNED_OUT'){
    currentUser = null; currentProfile = null; allProfiles = [];
    document.getElementById('app-view').style.display = 'none';
    document.getElementById('user-badge').style.display = 'none';
    document.getElementById('login-view').style.display = 'block';
  }
});
