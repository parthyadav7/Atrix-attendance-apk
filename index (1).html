<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atrix — Attendance Register</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2340">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#1B2340; --paper:#FAF8F3; --paper-line:#E3DFD3;
    --present:#3E8E82; --present-bg:#E4F1EE;
    --absent:#C1554A; --absent-bg:#F6E6E3;
    --half:#D69A3E; --half-bg:#F8EDD9;
    --muted:#8B8676; --brand:#F5A623;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper);
    background-image: repeating-linear-gradient(transparent, transparent 38px, var(--paper-line) 39px);
    font-family:'Inter',sans-serif; color:var(--ink); min-height:100vh;
  }
  .wrap{max-width:960px;margin:0 auto;padding:24px 20px 80px;}
  header.hero{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:22px;flex-wrap:wrap;gap:10px;
  }
  header.hero .brand-mark{display:flex;align-items:center;gap:12px;}
  header.hero .brand-mark img{height:46px;width:auto;border-radius:8px;}
  header.hero .tag{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
  .user-badge{display:flex;align-items:center;gap:10px;}
  .role-pill{font-family:'JetBrains Mono',monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.05em;padding:4px 10px;border-radius:20px;background:var(--brand);color:var(--ink);font-weight:700;}

  nav.tabs{display:flex;gap:2px;margin-bottom:26px;border-bottom:1px solid var(--paper-line);overflow-x:auto;}
  nav.tabs button{
    font-family:'Inter',sans-serif;font-weight:600;font-size:0.88rem;background:none;border:none;
    padding:12px 18px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px;
    transition:color .15s ease, border-color .15s ease;white-space:nowrap;
  }
  nav.tabs button.active{color:var(--ink);border-bottom-color:var(--brand);}
  nav.tabs button:hover{color:var(--ink);}

  .panel{display:none;}
  .panel.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}

  .card{background:#fff;border:1px solid var(--paper-line);border-radius:12px;padding:22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(27,35,64,0.04), 0 8px 24px rgba(27,35,64,0.03);}
  h2.section-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;margin:0 0 14px;}

  input[type=text], input[type=email], input[type=password], select{
    font-family:'Inter',sans-serif;font-size:0.92rem;padding:10px 12px;border:1.5px solid var(--paper-line);
    border-radius:7px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s;width:100%;
  }
  input:focus, select:focus{border-color:var(--ink);}
  input.dmy-input{font-family:'JetBrains Mono',monospace;width:120px;letter-spacing:0.03em;}
  input.dmy-input.invalid{border-color:var(--absent);}
  label.field-label{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;}
  .row-form{display:flex;gap:10px;flex-wrap:wrap;}

  button.btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:0.88rem;padding:10px 18px;border-radius:8px;
    border:1.5px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;
    transition:transform .12s ease, opacity .15s ease, box-shadow .15s ease;
  }
  button.btn:hover{opacity:0.9;box-shadow:0 4px 12px rgba(27,35,64,0.18);}
  button.btn:active{transform:translateY(1px);}
  button.btn:disabled{opacity:0.5;cursor:not-allowed;}
  button.btn.ghost{background:none;color:var(--ink);}
  button.btn.small{padding:6px 12px;font-size:0.78rem;}
  button.btn.wide{width:100%;}

  /* ---------- LOGIN ---------- */
  #login-view{max-width:380px;margin:60px auto 0;}
  #login-view .card{padding:32px 26px;border-top:3px solid var(--brand);}
  #login-view h2.section-title{margin-bottom:20px;}
  #login-view .field{margin-bottom:16px;}
  #login-view input{padding:11px 13px;}
  #login-error{color:var(--absent);font-size:0.85rem;margin-top:10px;display:none;}

  /* ---------- Attendance status card ---------- */
  .status-hero{text-align:center;padding:20px 10px;}
  .status-date{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:0.8rem;margin-bottom:6px;}
  .status-badge{
    display:inline-block;font-family:'Fraunces',serif;font-weight:700;font-size:1.4rem;
    padding:10px 26px;border-radius:14px;margin:8px 0 16px;animation:popIn .25s ease;
  }
  @keyframes popIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
  .status-badge.p{background:var(--present-bg);color:var(--present);}
  .status-badge.a{background:var(--absent-bg);color:var(--absent);}
  .status-badge.h{background:var(--half-bg);color:var(--half);}
  .time-line{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--muted);margin:4px 0;}
  .time-line a{color:var(--ink);}
  .mark-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
  .mark-buttons button{min-width:120px;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;
    opacity:0;pointer-events:none;transition:all .25s;font-weight:500;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">
  <div id="login-view">
    <div class="card">
      <h2 class="section-title">Sign In</h2>
      <form id="login-form">
        <div class="field">
          <label class="field-label">Email</label>
          <input type="email" id="login-email" required placeholder="admin@example.com">
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn wide" id="login-btn">Log In</button>
        <div id="login-error"></div>
      </form>
    </div>
  </div>

  <div id="app-view" class="hidden">
    <header class="hero">
      <div class="brand-mark">
        <div>
          <h1 style="margin:0;font-size:1.4rem;font-family:'Fraunces',serif;">Atrix</h1>
          <span class="tag">Attendance Register</span>
        </div>
      </div>
      <div class="user-badge">
        <span id="user-display" style="font-size:0.85rem;font-weight:600;"></span>
        <button id="logout-btn" class="btn ghost small">Logout</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="attendance">Attendance</button>
    </nav>

    <div id="attendance-panel" class="panel active">
      <div class="card status-hero">
        <div class="status-date" id="current-date">Today</div>
        <div class="status-badge p">Welcome Admin</div>
        <p>Aap safaltapoorvak log in ho chuke hain!</p>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// Supabase init (Replace SUPABASE_URL and SUPABASE_KEY with your credentials)
const SUPABASE_URL = "https://your-supabase-url.supabase.co";
const SUPABASE_KEY = "your-anon-key";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Elements
const loginView = document.getElementById('login-view');
const appView = document.getElementById('app-view');
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');
const userDisplay = document.getElementById('user-display');
const logoutBtn = document.getElementById('logout-btn');

function showAppView(email) {
  loginView.classList.add('hidden');
  appView.classList.remove('hidden');
  userDisplay.innerText = email;
}

function showLoginView() {
  appView.classList.add('hidden');
  loginView.classList.remove('hidden');
}

// Form submit listener
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.style.display = 'none';
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      loginError.innerText = error.message;
      loginError.style.display = 'block';
    } else {
      showToast('Login Successful!');
      showAppView(data.user.email);
    }
  } catch (err) {
    loginError.innerText = "Connection Error or Invalid Credentials";
    loginError.style.display = 'block';
  }
});

// Logout listener
logoutBtn.addEventListener('click', async () => {
  await sb.auth.signOut();
  showLoginView();
  showToast('Logged out');
});

// Initial session check
(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user) {
    showAppView(session.user.email);
  } else {
    showLoginView();
  }
})();
</script>
</body>
</html>
